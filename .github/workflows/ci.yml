name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Typecheck, Lint, Test & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

      - name: Verify labels
        run: node scripts/verify-labels.cjs

      - name: Build
        run: pnpm build

      - name: Verify built dist
        # Catches the regressions that have hit the bundle in past
        # builds: ort free var in the module worker, sw.ts not in
        # Vite inputs, CSP missing wasm-unsafe-eval, etc. The
        # script is a static-analysis smoke test — it parses the
        # built JS and asserts invariants. It does NOT need a real
        # browser or a real ONNX file (a WARN is emitted if the
        # models are missing, which is expected on every-push CI
        # because the heavy export happens in release.yml).
        run: pnpm verify:dist

      - name: Security audit
        run: pnpm audit --audit-level=high || true

      - name: License check
        run: npx license-checker --production --failOn "GPL-3.0;AGPL-3.0" || true

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7


  secrets-scan:
    name: Secrets scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install and run gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz | tar -xz -C /usr/local/bin gitleaks
          gitleaks detect --source . --verbose --no-banner

